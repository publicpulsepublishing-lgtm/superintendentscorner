name: Update News

on:
  schedule:
    - cron: "0 11 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser

      - name: Fetch and inject news
        run: python fetch_news.py

      - name: Commit and push changes
        run: |
          git config user.name  "News Bot"
          git config user.email "newsbot@superintendentscorner.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto-update: fresh news $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
